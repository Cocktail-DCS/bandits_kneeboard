<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCS Bandits Kneeboard</title>
    <icon rel="icon" href="images/emblem.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <button id="sidebar-toggle" onclick="toggleSidebar()">
        <span class="toggle-arrow">▼</span>
        RADIO COMMS &amp; NOTAS
    </button>

    <aside id="sidebar">
        <!-- <small>preview - 3 - iron horizon dia 1</small> -->
        <table class="radio-table" id="radio-table">
            <colgroup>
                <col class="col-small"> <col class="col-large"> <col class="col-medium">
                <col class="col-small"> <col class="col-large"> <col class="col-medium">
            </colgroup>
            <thead>
                <tr><th colspan="6" class="header-green">RADIO COMMS</th></tr>
                <tr class="bg-white" id="radio-header-row">
                </tr>
            </thead>
            <tbody class="bg-white" id="radio-table-body">
                <!-- Filas generadas dinámicamente desde CSV -->
            </tbody>
        </table>

        <div class="card" id="package-selector-card">
            <h3>PAQUETE DE VUELO</h3>
            <select id="package-select" class="package-select">
                <!-- Se rellena dinámicamente desde packages.csv -->
            </select>
        </div>

        <div class="card">
            <h3>NOTAS GENERALES</h3>
            <strong>Soft Deck: 10.000 ft AGL</strong>
            <br>
            <strong>Hard Deck: 5.000 ft AGL</strong>
            <br>
            <br>
            <textarea id="notes-general" class="notes-input" style="min-height: 100px;" placeholder=
"Este espacio esta reservado para tus notas.
Usalo sabiamente.">
</textarea>
            <br>
            <br>
            <!-- <img src="images/mapa.png" class="img-full" style="width: 100%;"> -->
        </div>
    </aside>

    <main id="main">
        <nav class="tabs-nav">
            <!-- Aqui se añaden los distintos archivos para que aparezcan en la barra -->
        </nav>

        <div id="tab-content-container" class="tab-content active" style="display: block;">
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
