<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCS Advanced Kneeboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <button id="sidebar-toggle" onclick="toggleSidebar()">
        <span class="toggle-arrow">▼</span>
        RADIO COMMS &amp; NOTAS
    </button>

    <aside id="sidebar" min-width="300px">
        <table class="radio-table" id="radio-table">
            <colgroup>
                <col class="col-small"> <col class="col-large"> <col class="col-small">
                <col class="col-small"> <col class="col-large"> <col class="col-small">
            </colgroup>
            <thead>
                <tr><th colspan="6" class="header-green">RADIO COMMS</th></tr>
                <tr class="bg-white" id="radio-header-row">
                    <!-- Cabecera se rellena via JS con los nombres de agencia -->
                </tr>
            </thead>
            <tbody class="bg-white" id="radio-table-body">
                <!-- Filas generadas dinámicamente desde CSV -->
            </tbody>
        </table>

            <div class="card">
                <h3>NOTAS GENERALES</h3>
                <strong>Soft Deck: FL150</strong>
                <br>
                <strong>Hard Deck: FL120</strong>
                <br>
                <br>
                <img src="images/holds.png" class="img-full" style="width: 100%;">
            </div>
        </aside>

    <main id="main">
        <nav class="tabs-nav">
            <!-- Aqui se añaden los distintos archivos para que aparezcan en la barra -->
            <button class="tab-btn active" onclick="loadTab('startup_taxi', event)">En tierra - Inicio</button>
            <button class="tab-btn" onclick="loadTab('tanker', event)">Repostaje</button>
            <button class="tab-btn" onclick="loadTab('holding_push', event)">Holding</button>
            <button class="tab-btn" onclick="loadTab('shutdown_taxi', event)">En tierra - Fin</button>
        </nav>

        <div id="tab-content-container" class="tab-content active" style="display: block;">
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
